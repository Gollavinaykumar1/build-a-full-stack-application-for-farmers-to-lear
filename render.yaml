services:
  - type: web
    name: build-a-full-stack-application-for-farmers-to-lear
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: via-db
          property: connectionString
databases:
  - name: via-db
    plan: free
